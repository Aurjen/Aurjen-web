<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>母线槽产品展示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            padding: 40px 20px;
            color: #1a1a2e;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        .page-header { text-align: center; margin-bottom: 40px; }
        .page-header h1 { font-size: 32px; font-weight: 700; }
        .page-header p { color: #666; margin-top: 8px; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.12);
        }

        .product-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            background: #e8ecf1;
        }

        .product-card .info {
            padding: 18px 20px 22px;
        }

        .product-card .info h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .product-card .info .description {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-card .info .price {
            font-size: 20px;
            font-weight: 700;
            color: #e74c3c;
        }

        .loading { text-align: center; padding: 60px 0; color: #999; }
        .error-msg { text-align: center; padding: 40px; color: #e74c3c; background: #fef0f0; border-radius: 12px; }

        /* ===== 模态框 (弹窗) ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #fff;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 30px 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
        }
        .modal-close:hover { color: #333; }

        .modal img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .modal h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .modal .modal-price {
            font-size: 22px;
            font-weight: 700;
            color: #e74c3c;
            margin-bottom: 15px;
        }

        .modal .modal-desc {
            color: #555;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .modal .specs-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .modal .specs-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
        }

        .modal .specs-table td:first-child {
            font-weight: 600;
            color: #333;
            width: 40%;
            background: #f8f9fa;
        }

        .modal .specs-table td:last-child {
            color: #555;
        }

        @media (max-width: 600px) {
            .modal { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>🔌 母线槽产品中心</h1>
        <p>点击产品卡片查看详细技术参数</p>
    </div>
    <div id="productGrid" class="product-grid">
        <div class="loading">加载中</div>
    </div>
</div>

<!-- 模态框 -->
<div id="modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <div id="modalContent">
            <!-- 由 JavaScript 动态填充 -->
        </div>
    </div>
</div>

<script>
    // ---------- 加载产品列表 ----------
    (async function loadProducts() {
        const grid = document.getElementById('productGrid');
        try {
            const res = await fetch('products.json');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const products = await res.json();
            if (!Array.isArray(products) || products.length === 0) {
                grid.innerHTML = '<div class="error-msg">暂无产品</div>';
                return;
            }
            let html = '';
            products.forEach((p, index) => {
                const name = p.name || '未命名';
                const desc = p.description || '';
                const price = p.price || '询价';
                const img = p.image || '';
                html += `
                    <div class="product-card" data-index="${index}" onclick="openModal(${index})">
                        <img src="${img}" alt="${name}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22260%22 height=%22220%22%3E%3Crect width=%22260%22 height=%22220%22 fill=%22%23e8ecf1%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2214%22 font-family=%22sans-serif%22%3E暂无图片%3C/text%3E%3C/svg%3E'">
                        <div class="info">
                            <h3>${escapeHtml(name)}</h3>
                            <div class="description">${escapeHtml(desc)}</div>
                            <div class="price">${escapeHtml(price)}</div>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
            // 保存产品数据供弹窗使用
            window.__products = products;
        } catch (e) {
            grid.innerHTML = `<div class="error-msg">加载失败：${e.message}</div>`;
        }
    })();

    // ---------- 弹窗逻辑 ----------
    function openModal(index) {
        const products = window.__products;
        if (!products || !products[index]) return;
        const p = products[index];
        const modal = document.getElementById('modal');
        const content = document.getElementById('modalContent');

        let specsHtml = '';
        if (p.specs) {
            specsHtml = '<table class="specs-table">';
            for (const [key, value] of Object.entries(p.specs)) {
                specsHtml += `<tr><td>${escapeHtml(key)}</td><td>${escapeHtml(value)}</td></tr>`;
            }
            specsHtml += '</table>';
        } else {
            specsHtml = '<p style="color:#999;">暂无详细参数</p>';
        }

        content.innerHTML = `
            <img src="${p.image || ''}" alt="${p.name}" onerror="this.style.display='none'">
            <h2>${escapeHtml(p.name)}</h2>
            <div class="modal-price">${escapeHtml(p.price)}</div>
            <div class="modal-desc">${escapeHtml(p.description || '')}</div>
            <h3 style="margin-top:20px; margin-bottom:10px;">📋 技术参数</h3>
            ${specsHtml}
        `;

        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal(event) {
        if (event && event.target !== event.currentTarget) return;
        document.getElementById('modal').classList.remove('active');
        document.body.style.overflow = '';
    }

    // 按 ESC 键关闭
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
    });

    // ---------- 辅助函数 ----------
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>

</body>
</html>
