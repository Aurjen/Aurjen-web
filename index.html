<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>母线槽 · 电力传输专家</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            color: #1a1a2e;
            padding-top: 70px;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #0b1a33;
            color: #fff;
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 999;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
        }

        .navbar .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .navbar .logo span {
            color: #4fc3f7;
        }

        .navbar .nav-links {
            display: flex;
            list-style: none;
            gap: 28px;
            align-items: center;
        }

        .navbar .nav-links li {
            cursor: pointer;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.75);
            transition: color 0.2s;
            padding: 6px 0;
            border-bottom: 2px solid transparent;
        }
        .navbar .nav-links li:hover,
        .navbar .nav-links li.active {
            color: #fff;
            border-bottom-color: #4fc3f7;
        }

        .navbar .contact-btn {
            background: #4fc3f7;
            color: #0b1a33;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-left: 10px;
        }
        .navbar .contact-btn:hover {
            background: #81d4fa;
        }

        /* 语言切换按钮 */
        .lang-switch {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 12px;
        }
        .lang-switch:hover {
            background: rgba(255,255,255,0.15);
            border-color: #4fc3f7;
        }

        /* ===== 主容器 ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        /* ===== 页面标题 ===== */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .page-header h1 {
            font-size: 32px;
            font-weight: 700;
        }
        .page-header p {
            color: #666;
            margin-top: 8px;
        }

        /* ===== 页面板块 ===== */
        .page-section {
            display: none;
            animation: fadeIn 0.35s ease;
        }
        .page-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 产品网格 ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.11);
        }
        .product-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            background: #e8ecf1;
        }
        .product-card .info {
            padding: 18px 20px 22px;
        }
        .product-card .info h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .product-card .info .description {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .product-card .info .price {
            font-size: 18px;
            font-weight: 700;
            color: #e74c3c;
        }

        /* ===== 产品详情 ===== */
        .product-detail {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            max-width: 800px;
            margin: 0 auto;
        }
        .product-detail img {
            width: 100%;
            max-height: 380px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        .product-detail h2 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .product-detail .detail-price {
            font-size: 24px;
            font-weight: 700;
            color: #e74c3c;
            margin-bottom: 16px;
        }
        .product-detail .detail-desc {
            font-size: 16px;
            color: #444;
            line-height: 1.8;
            margin-bottom: 24px;
        }
        .product-detail .specs-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .product-detail .specs-table td {
            padding: 10px 16px;
            border-bottom: 1px solid #eee;
        }
        .product-detail .specs-table td:first-child {
            font-weight: 600;
            color: #333;
            width: 35%;
            background: #f8f9fa;
        }
        .product-detail .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #0b1a33;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
        }
        .product-detail .back-link:hover {
            color: #4fc3f7;
        }

        /* ===== 内容卡片（公司概况等） ===== */
        .content-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            max-width: 900px;
            margin: 0 auto;
        }
        .content-card h2 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #0b1a33;
        }
        .content-card p {
            font-size: 16px;
            line-height: 1.9;
            color: #444;
            margin-bottom: 16px;
        }
        .content-card ul {
            padding-left: 24px;
            line-height: 2;
            color: #444;
        }

        .news-item {
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .news-item .date {
            color: #999;
            font-size: 14px;
        }
        .news-item h4 {
            font-size: 17px;
            margin: 4px 0 6px;
        }
        .news-item p {
            color: #666;
            font-size: 15px;
        }

        /* ===== 加载 & 错误 ===== */
        .loading {
            text-align: center;
            padding: 60px 0;
            color: #999;
        }
        .error-msg {
            text-align: center;
            padding: 40px;
            color: #e74c3c;
            background: #fef0f0;
            border-radius: 12px;
        }

        /* ===== 模态框（联系我们） ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #fff;
            border-radius: 20px;
            max-width: 480px;
            width: 92%;
            padding: 36px 32px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: fadeIn 0.3s ease;
        }
        .modal-close {
            position: absolute;
            top: 14px;
            right: 18px;
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
            color: #aaa;
        }
        .modal-close:hover {
            color: #333;
        }
        .modal h2 {
            font-size: 24px;
            margin-bottom: 6px;
            color: #0b1a33;
        }
        .modal .sub {
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .modal label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 14px;
            color: #333;
        }
        .modal label .required {
            color: #e74c3c;
        }
        .modal input,
        .modal textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 16px;
            font-family: inherit;
            transition: border 0.2s;
        }
        .modal input:focus,
        .modal textarea:focus {
            outline: none;
            border-color: #4fc3f7;
            box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.15);
        }
        .modal textarea {
            resize: vertical;
            min-height: 80px;
        }
        .modal .submit-btn {
            width: 100%;
            padding: 12px;
            background: #0b1a33;
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .modal .submit-btn:hover {
            background: #1a2f4f;
        }
        .modal .form-error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 12px;
            display: none;
        }
        .modal .form-success {
            text-align: center;
            padding: 20px 0;
            display: none;
        }
        .modal .form-success .check {
            font-size: 52px;
            margin-bottom: 10px;
        }
        .modal .form-success h3 {
            color: #0b1a33;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 16px;
                height: 58px;
                flex-wrap: wrap;
            }
            .navbar .logo {
                font-size: 16px;
            }
            .navbar .nav-links {
                gap: 14px;
                font-size: 13px;
                flex-wrap: wrap;
            }
            .navbar .nav-links li {
                font-size: 13px;
            }
            .navbar .contact-btn {
                font-size: 12px;
                padding: 6px 14px;
            }
            .lang-switch {
                font-size: 12px;
                padding: 4px 10px;
            }
            .container {
                padding: 20px 12px 40px;
            }
            .product-detail {
                padding: 20px;
            }
            .content-card {
                padding: 24px 18px;
            }
            .modal {
                padding: 28px 20px;
            }
        }
        @media (max-width: 500px) {
            body {
                padding-top: 110px;
            }
            .navbar .nav-links {
                gap: 6px;
            }
            .navbar .nav-links li {
                font-size: 12px;
                padding: 4px 0;
            }
            .navbar .contact-btn {
                font-size: 11px;
                padding: 4px 10px;
                margin-left: 4px;
            }
            .lang-switch {
                font-size: 11px;
                padding: 3px 8px;
                margin-left: 4px;
            }
        }
    </style>
</head>

                    <div class="form-error" id="formError" data-i18n="form_error">请完善所有必填项</div>

                about_vision_text: 'To become a globally leading provider of busway system solutions.',
                about_values: 'Core Values',
                about_values_list: ['Customer First · Integrity · Innovation Excellence · Win-Win Cooperation'],
                about_footer: 'For any cooperation needs, please click the "Contact Us" button at the top right, and we will get back to you soon.',
                contact_title: '📩 Contact Us',
                contact_sub: 'We will reply within 24 hours',
                contact_name: 'Name',
                contact_name_ph: 'Enter your name',
                contact_company: 'Company',
                contact_company_ph: 'Enter company name',
                contact_email: 'Email',
                contact_email_ph: 'Enter your email address',
                contact_message: 'Message',
                contact_message_ph: 'Enter your requirements or questions...',
                optional: 'Optional',
                form_error: 'Please fill in name and email (required)',
                submit_btn: 'Submit',
                success_title: 'Submitted!',
                success_msg: 'We will contact you within 24 hours.',
                success_btn: 'Got it'
            }
        };

        // ======================================================
        // 2. 当前语言 & 切换
        // ======================================================
        let currentLang = localStorage.getItem('lang') || 'zh';

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.documentElement.lang = (lang === 'zh') ? 'zh-CN' : 'en';
            document.getElementById('langSwitch').textContent = (lang === 'zh') ? 'EN' : '中文';
            // 重新渲染所有内容
            renderAllContent();
            // 重新加载产品列表（如果当前在 products 或 detail）
            const activePage = document.querySelector('.page-section.active');
            if (activePage) {
                const id = activePage.id;
                if (id === 'page-products') {
                    loadProducts();
                } else if (id === 'page-detail') {
                    // 重新渲染当前产品详情
                    const params = new URLSearchParams(window.location.search);
                    const idx = params.get('product');
                    if (idx !== null && allProducts.length > 0) {
                        renderDetail(allProducts[parseInt(idx)]);
                    }
                } else if (id === 'page-company') {
                    renderCompany();
                } else if (id === 'page-news') {
                    renderNews();
                } else if (id === 'page-about') {
                    renderAbout();
                }
            }
            // 更新所有带 data-i18n 属性的元素
            updateStaticTexts(lang);
            // 更新占位符
            updatePlaceholders(lang);
        }

        // 更新静态文本
        function updateStaticTexts(lang) {
            const t = translations[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key] !== undefined) {
                    el.textContent = t[key];
                }
            });
        }

        // 更新占位符
        function updatePlaceholders(lang) {
            const t = translations[lang];
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (t[key] !== undefined) {
                    el.placeholder = t[key];
                }
            });
        }

        // 语言切换按钮事件
        document.getElementById('langSwitch').addEventListener('click', function() {
            const nextLang = (currentLang === 'zh') ? 'en' : 'zh';
            setLanguage(nextLang);
        });

        // ======================================================
        // 3. 渲染公司概况、新闻、关于我们（多语言）
        // ======================================================
        function renderCompany() {
            const t = translations[currentLang];
            const container = document.getElementById('companyContent');
            let listHtml = t.company_list.map(item => `<li>${item}</li>`).join('');
            container.innerHTML = `
                <h2>${t.company_title}</h2>
                <p>${t.company_text1}</p>
                <p>${t.company_text2}</p>
                <p><strong>${t.company_strong}</strong></p>
                <ul>${listHtml}</ul>
            `;
        }

        function renderNews() {
            const t = translations[currentLang];
            const container = document.getElementById('newsContent');
            let itemsHtml = t.news_items.map(item => `
                <div class="news-item">
                    <div class="date">${item.date}</div>
                    <h4>${item.title}</h4>
                    <p>${item.desc}</p>
                </div>
            `).join('');
            container.innerHTML = `
                <h2>${t.news_title}</h2>
                ${itemsHtml}
            `;
        }

        function renderAbout() {
            const t = translations[currentLang];
            const container = document.getElementById('aboutContent');
            let valuesHtml = t.about_values_list.map(v => `<li>${v}</li>`).join('');
            container.innerHTML = `
                <h2>${t.about_title}</h2>
                <p><strong>${t.about_who}</strong><br>${t.about_who_text}</p>
                <p><strong>${t.about_mission}</strong><br>${t.about_mission_text}</p>
                <p><strong>${t.about_vision}</strong><br>${t.about_vision_text}</p>
                <p><strong>${t.about_values}</strong></p>
                <ul>${valuesHtml}</ul>
                <p style="margin-top:20px; color:#888; font-size:14px;">${t.about_footer}</p>
            `;
        }

        // ======================================================
        // 4. 产品加载与渲染（多语言）
        // ======================================================
        let allProducts = [];

        async function loadProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = `<div class="loading" data-i18n="loading">${translations[currentLang].loading}</div>`;
            try {
                const res = await fetch('products.json');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                if (!Array.isArray(data) || data.length === 0) {
                    grid.innerHTML = `<div class="error-msg">${currentLang === 'zh' ? '暂无产品数据' : 'No product data'}</div>`;
                    return;
                }
                allProducts = data;
                renderProductList(data);
            } catch (e) {
                grid.innerHTML = `<div class="error-msg">${currentLang === 'zh' ? '加载失败：' : 'Load failed: '}${e.message}</div>`;
            }
        }

        function renderProductList(products) {
            const grid = document.getElementById('productGrid');
            const lang = currentLang;
            let html = '';
            products.forEach((p, i) => {
                const name = (lang === 'zh') ? p.name : (p.name_en || p.name);
                const desc = (lang === 'zh') ? p.description : (p.description_en || p.description);
                const price = (lang === 'zh') ? p.price : (p.price_en || p.price);
                const img = p.image || '';
                html += `
                    <div class="product-card" onclick="goToDetail(${i})">
                        <img src="${img}" alt="${name}" loading="lazy"
                             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22260%22 height=%22220%22%3E%3Crect width=%22260%22 height=%22220%22 fill=%22%23e8ecf1%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-size=%2214%22 font-family=%22sans-serif%22%3E${lang === 'zh' ? '暂无图片' : 'No image'}%3C/text%3E%3C/svg%3E'">
                        <div class="info">
                            <h3>${escapeHtml(name)}</h3>
                            <div class="description">${escapeHtml(desc)}</div>
                            <div class="price">${escapeHtml(price)}</div>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        // ======================================================
        // 5. 产品详情（多语言）
        // ======================================================
        function goToDetail(index) {
            const p = allProducts[index];
            if (!p) return;
            showPage('detail');
            const url = new URL(window.location);
            url.searchParams.set('product', index);
            window.history.pushState({}, '', url);
            renderDetail(p);
        }

        function renderDetail(p) {
            const container = document.getElementById('productDetailContainer');
            const lang = currentLang;
            const t = translations[lang];
            const name = (lang === 'zh') ? p.name : (p.name_en || p.name);
            const desc = (lang === 'zh') ? p.description : (p.description_en || p.description);
            const price = (lang === 'zh') ? p.price : (p.price_en || p.price);
            const specs = (lang === 'zh') ? p.specs : (p.specs_en || p.specs);

            let specsHtml = '';
            if (specs && typeof specs === 'object' && Object.keys(specs).length > 0) {
                specsHtml = `<table class="specs-table">`;
                for (const [key, value] of Object.entries(specs)) {
                    specsHtml += `<tr><td>${escapeHtml(key)}</td><td>${escapeHtml(value)}</td></tr>`;
                }
                specsHtml += `</table>`;
            } else {
                specsHtml = `<p style="color:#999;">${t.no_specs}</p>`;
            }

            container.innerHTML = `
                <div class="product-detail">
                    <img src="${p.image || ''}" alt="${name}" onerror="this.style.display='none'">
                    <h2>${escapeHtml(name)}</h2>
                    <div class="detail-price">${escapeHtml(price)}</div>
                    <div class="detail-desc">${escapeHtml(desc)}</div>
                    <h3 style="margin-top:20px; margin-bottom:10px;">${t.specs_title}</h3>
                    ${specsHtml}
                    <div class="back-link" onclick="goBackToProducts()">${t.back_link}</div>
                </div>
            `;
        }

        function goBackToProducts() {
            showPage('products');
            const url = new URL(window.location);
            url.searchParams.delete('product');
            window.history.pushState({}, '', url);
            loadProducts();
        }

        // ======================================================
        // 6. 导航切换 & 显示页面
        // ======================================================
        function showPage(pageName) {
            document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
            const target = document.getElementById('page-' + pageName);
            if (target) target.classList.add('active');
            document.querySelectorAll('.nav-links li[data-page]').forEach(el => {
                el.classList.toggle('active', el.dataset.page === pageName);
            });
        }

        document.querySelectorAll('.nav-links li[data-page]').forEach(el => {
            el.addEventListener('click', function() {
                const page = this.dataset.page;
                if (page !== 'detail') {
                    const url = new URL(window.location);
                    url.searchParams.delete('product');
                    window.history.pushState({}, '', url);
                }
                showPage(page);
                if (page === 'products') {
                    loadProducts();
                } else if (page === 'company') {
                    renderCompany();
                } else if (page === 'news') {
                    renderNews();
                } else if (page === 'about') {
                    renderAbout();
                }
            });
        });

        // ======================================================
        // 7. URL 参数处理（刷新保留详情页）
        // ======================================================
        function handleUrlOnLoad() {
            const params = new URLSearchParams(window.location.search);
            const productIndex = params.get('product');
            if (productIndex !== null && allProducts.length > 0) {
                const idx = parseInt(productIndex);
                if (allProducts[idx]) {
                    showPage('detail');
                    renderDetail(allProducts[idx]);
                    return;
                }
            }
            showPage('products');
            loadProducts();
            // 渲染静态内容（公司、新闻、关于）以备切换
            renderCompany();
            renderNews();
            renderAbout();
        }

        // ======================================================
        // 8. 联系我们弹窗（保持不变）
        // ======================================================
        function openContactModal() {
            document.getElementById('contactModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            document.getElementById('contactForm').reset();
            document.getElementById('contactFormArea').style.display = 'block';
            document.getElementById('contactSuccess').style.display = 'none';
            document.getElementById('formError').style.display = 'none';
            // 更新表单里的占位符和标签（语言已经更新）
        }

        function closeContactModal() {
            document.getElementById('contactModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('contactOpenBtn').addEventListener('click', openContactModal);
        document.getElementById('contactCloseBtn').addEventListener('click', closeContactModal);
        document.getElementById('contactModal').addEventListener('click', function(e) {
            if (e.target === this) closeContactModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeContactModal();
        });

        function handleContactSubmit(e) {
            e.preventDefault();
            const name = document.getElementById('contactName').value.trim();
            const email = document.getElementById('contactEmail').value.trim();
            const errorEl = document.getElementById('formError');
            const t = translations[currentLang];

            if (!name || !email) {
                errorEl.textContent = t.form_error;
                errorEl.style.display = 'block';
                return false;
            }
            if (!email.includes('@') || !email.includes('.')) {
                errorEl.textContent = currentLang === 'zh' ? '请输入有效的邮箱地址' : 'Please enter a valid email';
                errorEl.style.display = 'block';
                return false;
            }

            errorEl.style.display = 'none';
            document.getElementById('contactFormArea').style.display = 'none';
            document.getElementById('contactSuccess').style.display = 'block';

            const company = document.getElementById('contactCompany').value.trim();
            const msg = document.getElementById('contactMessage').value.trim();
            console.log('📩 Contact form submitted:', { name, company, email, msg });
            return false;
        }

        // ======================================================
        // 9. 工具函数
        // ======================================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ======================================================
        // 10. 初始化
        // ======================================================
        // 先设置语言（从 localStorage 读取）
        setLanguage(currentLang);

        // 加载产品数据并处理 URL
        loadProducts().then(() => {
            handleUrlOnLoad();
        });

        // 监听浏览器回退/前进
        window.addEventListener('popstate', function() {
            const params = new URLSearchParams(window.location.search);
            const idx = params.get('product');
            if (idx !== null && allProducts[parseInt(idx)]) {
                showPage('detail');
                renderDetail(allProducts[parseInt(idx)]);
            } else {
                showPage('products');
                loadProducts();
            }
        });

        // 保证公司、新闻、关于内容在初始时渲染（但页面隐藏）
        // 在 handleUrlOnLoad 中已经渲染，但可能因为顺序问题，再确保一次
        setTimeout(() => {
            renderCompany();
            renderNews();
            renderAbout();
        }, 100);
    </script>

</body>
</html>
